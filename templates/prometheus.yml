global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

# Set up alerting to the configured alert manager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'

scrape_configs:
  # Local Prometheus metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
      
  # Local node-exporter metrics for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    metrics_path: '/metrics'
    
  # Local docker metrics via cadvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'
    
  # River node metrics from this server
  - job_name: 'river-local'
    static_configs:
      - targets: ['river:{{ river_metrics_port }}']
    metrics_path: '/metrics'
    labels:
      instance: "{{ server_name }}"
  
  # External River nodes metrics - dynamically add all servers
  {% if groups['all'] is defined %}
  {% for host in groups['all'] %}
  {% if host != inventory_hostname %}
  - job_name: "river-{{ host | regex_replace('[^a-zA-Z0-9]', '-') }}"
    static_configs:
      - targets: ['{{ host }}:9090']
    metrics_path: '/metrics'
    honor_labels: true
    labels:
      instance: "{{ host }}"
  {% endif %}
  {% endfor %}
  {% endif %} 