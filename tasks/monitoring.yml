---
# Monitoring setup for Ethereum staking nodes using Prometheus, Grafana, Loki, Node Exporter, cAdvisor and Alert Manager

- name: Create monitoring directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  with_items:
    - "{{ host_config_mount }}/prometheus"
    - "{{ host_config_mount }}/grafana"
    - "{{ host_config_mount }}/loki"
    - "{{ host_config_mount }}/alertmanager"
    - "{{ host_config_mount }}/dashboards"

# Prometheus Configuration
- name: Create Prometheus rules directory
  become: true
  ansible.builtin.file:
    path: "{{ host_config_mount }}/prometheus/rules"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"

- name: Configure Prometheus
  become: true
  ansible.builtin.template:
    src: templates/prometheus.yml.j2
    dest: "{{ host_config_mount }}/prometheus/prometheus.yml"
    owner: "root"
    group: "root"
    mode: "0644"

# Node Exporter
- name: Start Node Exporter container
  become_user: root
  become: true
  community.docker.docker_container:
    name: "{{ node_exporter_name }}"
    image: "{{ node_exporter_image }}"
    state: started
    restart_policy: unless-stopped
    network_mode: bridge
    networks:
      - name: "eth-staking-network-net"
    published_ports:
      - "127.0.0.1:{{ node_exporter_port }}:9100"
    command: "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"

# cAdvisor
- name: Start cAdvisor container
  become_user: root
  become: true
  community.docker.docker_container:
    name: "{{ cadvisor_name }}"
    image: "{{ cadvisor_image }}"
    state: started
    restart_policy: unless-stopped
    privileged: true
    network_mode: bridge
    networks:
      - name: "eth-staking-network-net"
    published_ports:
      - "127.0.0.1:{{ cadvisor_port }}:8080"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
  when: cadvisor_enabled | bool

# Loki
- name: Generate Loki config
  become_user: root
  become: true
  ansible.builtin.template:
    src: templates/loki-config.yml.j2
    dest: "{{ host_config_mount }}/loki/config.yml"
    owner: "root" 
    group: "root"
    mode: "0644"

- name: Start Loki container
  become_user: root
  become: true
  community.docker.docker_container:
    name: "{{ loki_name }}"
    image: "{{ loki_image }}"
    state: started
    restart_policy: unless-stopped
    network_mode: bridge
    networks:
      - name: "eth-staking-network-net"
    published_ports:
      - "127.0.0.1:{{ loki_port }}:3100"
    volumes:
      - "{{ host_config_mount }}/loki:/loki"
      - "{{ host_config_mount }}/loki/config.yml:/etc/loki/config.yml"
    command: "-config.file=/etc/loki/config.yml"

# Alertmanager
- name: Generate Alertmanager config
  become_user: root
  become: true
  ansible.builtin.template:
    src: templates/alertmanager.yml.j2
    dest: "{{ host_config_mount }}/alertmanager/alertmanager.yml"
    owner: "root"
    group: "root"
    mode: "0644"

- name: Start Alertmanager container
  become_user: root
  become: true
  community.docker.docker_container:
    name: "{{ alertmanager_name }}"
    image: "{{ alertmanager_image }}"
    state: started
    restart_policy: unless-stopped
    network_mode: bridge
    networks:
      - name: "eth-staking-network-net"
    published_ports:
      - "127.0.0.1:{{ alertmanager_port }}:9093"
    volumes:
      - "{{ host_config_mount }}/alertmanager:/alertmanager"
    command: "--config.file=/alertmanager/alertmanager.yml --storage.path=/alertmanager"

# Prometheus
- name: Start Prometheus container
  become_user: root
  become: true
  community.docker.docker_container:
    name: "{{ prometheus_name }}"
    image: "{{ prometheus_image }}"
    state: started
    restart_policy: unless-stopped
    network_mode: bridge
    networks:
      - name: "eth-staking-network-net"
    published_ports:
      - "127.0.0.1:{{ prometheus_port }}:9090"
    volumes:
      - "{{ host_config_mount }}/prometheus:/prometheus"
      - "{{ host_config_mount }}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "{{ host_config_mount }}/prometheus/rules:/etc/prometheus/rules"
    command: "--config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.console.libraries=/usr/share/prometheus/console_libraries --web.console.templates=/usr/share/prometheus/consoles --storage.tsdb.retention.time=15d"

# Configure Prometheus alert rules
- name: Configure Prometheus alert rules
  become_user: root
  become: true
  ansible.builtin.template:
    src: templates/alert_rules.yml.j2
    dest: "{{ host_config_mount }}/prometheus/rules/alert_rules.yml"
    owner: "root"
    group: "root"
    mode: "0644"

# Copy Ethereum dashboards for Grafana
- name: Copy Ethereum dashboards to Grafana
  become_user: root
  become: true
  ansible.builtin.copy:
    src: "files/dashboards/{{ item }}"
    dest: "{{ host_config_mount }}/dashboards/{{ item }}"
    owner: "root"
    group: "root"
    mode: "0644"
  with_items:
    - ethereum-validators-dashboard.json
    - ethereum-consensus-client-dashboard.json
    - ethereum-execution-client-dashboard.json
    - system-monitoring-dashboard.json
    - node-exporter-dashboard.json
    - home_staking_dashboard.json

# Configure Grafana provisioning
- name: Create Grafana provisioning directories
  become_user: root
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0755"
  with_items:
    - "{{ host_config_mount }}/grafana/provisioning/datasources"
    - "{{ host_config_mount }}/grafana/provisioning/dashboards"

- name: Configure Grafana datasources
  become_user: root
  become: true
  ansible.builtin.template:
    src: templates/grafana-datasources.yml.j2
    dest: "{{ host_config_mount }}/grafana/provisioning/datasources/datasources.yml"
    owner: "root"
    group: "root"
    mode: "0644"

- name: Configure Grafana dashboard providers
  become_user: root
  become: true
  ansible.builtin.template:
    src: templates/grafana-dashboards.yml.j2
    dest: "{{ host_config_mount }}/grafana/provisioning/dashboards/dashboards.yml"
    owner: "root"
    group: "root"
    mode: "0644"

# Start Grafana container
- name: Start Grafana container
  become_user: root
  become: true
  community.docker.docker_container:
    name: "{{ grafana_name }}"
    image: "{{ grafana_image }}"
    state: started
    restart_policy: unless-stopped
    network_mode: bridge
    networks:
      - name: "eth-staking-network-net"
    published_ports:
      - "127.0.0.1:{{ grafana_port }}:3000"
    env:
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - "{{ host_config_mount }}/grafana:/var/lib/grafana"
      - "{{ host_config_mount }}/dashboards:/var/lib/grafana/dashboards"
      - "{{ host_config_mount }}/grafana/provisioning:/etc/grafana/provisioning"
